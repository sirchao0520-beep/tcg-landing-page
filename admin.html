<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年制語文 TCG - 總指揮台</title>
    <style>
        /* 全局與佈局 */
        body { background-color: #f4f6f9; color: #333; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; font-size: 16px; }
        
        /* ======== 左側常駐導航列 ======== */
        .sidebar { width: 250px; background: #1a1e29; color: #fff; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar-header { padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #2c3245; display: flex; align-items: center; gap: 10px; color: #00ffcc; }
        .nav-item { padding: 15px 20px; color: #a0aabf; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; font-size: 16px; }
        .nav-item:hover { background: #232838; color: #fff; }
        .nav-item.active { background: #2a3042; color: #fff; border-left-color: #00ffcc; font-weight: bold; }
        .nav-divider { height: 1px; background: #2c3245; margin: 15px 0; }

        /* ======== 右側主內容區 ======== */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f4f6f9; }
        .topbar { background: #fff; padding: 15px 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 5; height: 35px; }
        .topbar h1 { margin: 0; font-size: 24px; color: #2c3e50; }
        
        select.class-filter { background: #fff; color: #3498db; border: 2px solid #3498db; padding: 8px 15px; font-size: 18px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* 頁籤切換邏輯 */
        .tab-content { display: none; padding: 20px 30px; height: calc(100vh - 65px); overflow-y: auto; box-sizing: border-box; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 內嵌框架專用樣式 */
        .tab-iframe { padding: 0; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; background: #121212; }

        /* 面板與卡片 */
        .grid-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-box { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 4px solid #3498db; }
        .form-box.purple { border-top-color: #9b59b6; }
        h3 { margin-top: 0; font-size: 18px; color: #2c3e50; margin-bottom: 15px; }
        
        input, textarea, select { background: #f8f9fa; color: #333; border: 1px solid #ddd; padding: 10px; border-radius: 6px; width: calc(100% - 22px); margin-bottom: 10px; font-size: 16px; }
        textarea { height: 60px; resize: none; }
        input:focus, textarea:focus, select:focus { border-color: #3498db; outline: none; background: #fff; }
        button.action-primary { background: #3498db; color: #fff; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button.action-primary:hover { background: #2980b9; }

        /* 數據表格 */
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 16px; }
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: bold; font-size: 15px; white-space: nowrap; }
        tr:hover { background-color: #f1f4f8; }
        
        /* 戰術按鈕群 */
        .btn-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .btn-sm { padding: 6px 10px; font-size: 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: 0.1s; }
        .btn-sm:active { transform: scale(0.95); }
        .btn-p1 { background: #2ecc71; color: #fff; } .btn-p2 { background: #27ae60; color: #fff; } .btn-p5 { background: #1abc9c; color: #fff; }
        .btn-m1 { background: #e74c3c; color: #fff; }
        .btn-hw { background: #f39c12; color: #fff; } .btn-leave { background: #16a085; color: #fff; }
        .btn-delete-mini { background: transparent; color: #e74c3c; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-size: 16px; font-weight: bold; } 
        .btn-delete-mini:hover { background: #fee; }
        
        .redeem-select { width: 150px; font-size: 14px; margin-bottom: 0; padding: 6px; display: inline-block; }
        .btn-redeem { background: #9b59b6; color: #fff; padding: 6px 15px; font-size: 14px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        .card-tag { display: inline-block; background: #f0f3f5; border: 1px solid #dcdde1; padding: 2px 8px; border-radius: 12px; font-size: 12px; color: #7f8fa6; margin: 2px; }
        .stat-val { font-size: 20px; font-weight: bold; }
        .score-color { color: #2980b9; } .gold-color { color: #f39c12; }
        .stat-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 12px; background: #eee; color: #555; margin-bottom: 2px; }
        .warn-text { background: #fee; color: #e74c3c; border: 1px solid #fcc; }
        
        /* 彈出視窗 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 25px; border-radius: 10px; width: 80%; max-width: 600px; color: #333; max-height: 80vh; overflow-y: auto; }
        .close-btn { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .inv-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #e74c3c; }
        .inv-item.resolved { border-left-color: #2ecc71; opacity: 0.6; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">⚙️ TCG 總指揮台</div>
        
        <div class="nav-item active" onclick="switchTab('tabTroops', this)">🦅 統御台 (大政維新)</div>
        <div class="nav-item" onclick="switchTab('tabInventory', this)">🎒 將士背包與軍需</div>
        
        <div class="nav-divider"></div>
        
        <div class="nav-item" onclick="switchTab('tabAssistant', this)">🛡️ 小助手指揮所</div>
        <div class="nav-item" onclick="switchTab('tabStudent', this)">⚔️ 士兵裝備登入</div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <h1 id="pageTitle">🦅 統御台 (大政維新)</h1>
            <select id="viewClassFilter" class="class-filter">
                <option value="ALL">顯示全部兵力</option>
                <option value="A班">A班</option>
                <option value="B班">B班</option>
                <option value="C班">C班</option>
            </select>
        </div>

        <div id="tabTroops" class="tab-content active">
            <div class="grid-panel">
                <div class="form-box">
                    <h3>⚡ 閃電擴軍 (從 Excel 複製)</h3>
                    <select id="batchClassSelect"><option value="A班">A班</option><option value="B班">B班</option><option value="C班">C班</option></select>
                    <textarea id="batchData" placeholder="格式：學號 [Tab] 姓名 (如 A01 諸葛亮)"></textarea>
                    <button id="batchBtn" class="action-primary">批次建檔注入</button>
                </div>
                <div class="form-box">
                    <h3>👤 單兵特招 / 資料修正</h3>
                    <div style="display:flex; gap:10px;">
                        <select id="stuClass" style="width:30%; margin:0;"><option value="A班">A班</option><option value="B班">B班</option><option value="C班">C班</option></select>
                        <input type="text" id="stuId" placeholder="學號" style="width:30%; margin:0;" />
                        <input type="text" id="stuName" placeholder="姓名" style="width:40%; margin:0;" />
                    </div>
                    <button id="addBtn" class="action-primary" style="margin-top: 10px;">建檔 / 更新</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>學號</th>
                        <th>姓名</th>
                        <th>班級</th>
                        <th>積分</th>
                        <th>金幣</th>
                        <th>狀態紀錄</th>
                        <th>戰術決策面板</th>
                    </tr>
                </thead>
                <tbody id="troopTableBody"></tbody>
            </table>
        </div>

        <div id="tabInventory" class="tab-content">
            <div class="grid-panel">
                <div class="form-box purple">
                    <h3>🃏 閃電鑄造卡牌 (兵器庫擴充)</h3>
                    <textarea id="batchCardData" placeholder="V1-01 基礎標點卡 1.0"></textarea>
                    <button id="batchCardBtn" class="action-primary" style="background:#9b59b6;">批次鑄造入庫</button>
                </div>
                <div class="form-box purple">
                    <h3>🔍 兵器庫現有模版預覽</h3>
                    <div id="cardPreviewBox" style="height: 100px; overflow-y: auto; background: #f8f9fa; padding: 10px; border-radius: 6px; font-size: 14px;"></div>
                </div>
            </div>
            <table>
                <thead><tr><th>學號/姓名</th><th>🎒 未換卡牌 (待發放實體)</th><th>📚 兌換歷史 (已結案)</th></tr></thead>
                <tbody id="inventoryTableBody"></tbody>
            </table>
        </div>

        <div id="tabAssistant" class="tab-content tab-iframe">
            <iframe src="assistant.html"></iframe>
        </div>

        <div id="tabStudent" class="tab-content tab-iframe">
            <iframe src="student.html"></iframe>
        </div>
    </main>

    <div id="disciplineModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('disciplineModal')">&times;</span>
            <h2 id="discModalTitle" style="color:#2c3e50; margin-top:0;">功課紀律追蹤面板</h2>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ddd;">
                <input type="text" id="hwTitleInput" placeholder="輸入作業名稱 (例如：第十課抄寫)" style="width: 100%; box-sizing: border-box; margin-bottom: 10px;" />
                <div style="display: flex; gap: 10px;">
                    <button class="btn-sm btn-m1" onclick="addAssignment('missing')" style="flex:1; padding:10px;">登記欠交 (-2分/-20金)</button>
                    <button class="btn-sm btn-leave" onclick="addAssignment('leave')" style="flex:1; padding:10px;">登記請假 (免扣)</button>
                </div>
            </div>
            <h4 style="color:#e74c3c; margin-bottom:5px;">🚨 待補交清單</h4>
            <div id="pendingHwList"></div>
            <h4 style="color:#2ecc71; margin-top:20px; margin-bottom:5px;">✅ 已補交/結案</h4>
            <div id="resolvedHwList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 替換為您的 Firebase 金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCZ7b0hjgkTMUTTNRDAjkcAMR374BH1c-o",
            authDomain: "language-tcg-db.firebaseapp.com",
            projectId: "language-tcg-db",
            storageBucket: "language-tcg-db.firebasestorage.app",
            messagingSenderId: "517995107179",
            appId: "1:517995107179:web:b326458b66991b97f2322e"
        };
        // ==========================================
     

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allStudentsData = [];
        let allCardsData = [];

        window.switchTab = function(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            document.getElementById('pageTitle').innerText = element.innerText;
            
            const filter = document.getElementById('viewClassFilter');
            if(tabId === 'tabTroops' || tabId === 'tabInventory') filter.style.display = 'block';
            else filter.style.display = 'none';
        };

        const viewClassFilter = document.getElementById('viewClassFilter');
        viewClassFilter.addEventListener('change', renderAllTables);

        onSnapshot(collection(db, "students"), (snapshot) => {
            allStudentsData = [];
            snapshot.forEach((doc) => { allStudentsData.push({ id: doc.id, ...doc.data() }); });
            renderAllTables(); 
        });

        onSnapshot(collection(db, "cards"), (snapshot) => {
            allCardsData = [];
            const previewBox = document.getElementById('cardPreviewBox'); previewBox.innerHTML = '';
            snapshot.forEach((doc) => { 
                allCardsData.push({ id: doc.id, ...doc.data() }); 
                previewBox.innerHTML += `<span class="card-tag"><strong>${doc.id}</strong> ${doc.data().name}</span> `;
            });
        });

        function renderAllTables() {
            const currentFilter = viewClassFilter.value;
            const troopBody = document.getElementById('troopTableBody');
            const invBody = document.getElementById('inventoryTableBody');
            troopBody.innerHTML = ''; invBody.innerHTML = '';

            const filteredData = allStudentsData.filter(s => currentFilter === "ALL" || s.class === currentFilter);
            filteredData.sort((a, b) => (a.class || "").localeCompare(b.class || "") || a.id.localeCompare(b.id));

            filteredData.forEach((data) => {
                const pendingHw = (data.assignments || []).filter(a => a.status === 'pending').length;
                const hwAlert = pendingHw > 0 ? `<span style="color:#e74c3c; font-weight:bold;">(${pendingHw})</span>` : '';

                // 【核心修正】：分開積分與金幣，並渲染狀態紀錄
                troopBody.innerHTML += `
                    <tr>
                        <td><strong>${data.id}</strong></td>
                        <td><strong>${data.name || ''}</strong></td>
                        <td style="color:#7f8fa6;">${data.class || ''}</td>
                        <td style="color:#2980b9; font-weight:bold; font-size:20px;">${data.score || 0}</td>
                        <td style="color:#f39c12; font-weight:bold; font-size:20px;">${data.gold || 0}</td>
                        <td>
                            <div class="stat-badge ${data.missingHw > 0 ? 'warn-text' : ''}">欠交: ${data.missingHw || 0}</div><br>
                            <div class="stat-badge">請假: ${data.leaveDays || 0}</div>
                        </td>
                        <td>
                            <div class="btn-group">
                                <button class="btn-sm btn-p1" onclick="execAction('${data.id}', 1)">+1</button>
                                <button class="btn-sm btn-p2" onclick="execAction('${data.id}', 2)">+2</button>
                                <button class="btn-sm btn-p5" onclick="execAction('${data.id}', 5)">+5</button>
                                <button class="btn-sm btn-m1" onclick="execAction('${data.id}', -1)">-1</button>
                                <span style="color:#ddd;">|</span>
                                <button class="btn-sm btn-hw" onclick="openDiscModal('${data.id}', '${data.name}')">功課 ${hwAlert}</button>
                                <button class="btn-delete-mini" onclick="deleteStudent('${data.id}')" title="抹除兵籍">✖</button>
                            </div>
                        </td>
                    </tr>
                `;

                // 背包核銷渲染
                const cards = data.cards || [];
                const pendingCards = cards.filter(c => !c.redeemed).reverse();
                const redeemedCards = cards.filter(c => c.redeemed).reverse();
                
                let pendingHTML = `<span style="color:#888; font-size:14px;">空空如也</span>`;
                if (pendingCards.length > 0) {
                    let options = pendingCards.map(c => `<option value="${c.instanceId || `old_${c.name}`}">${c.name} (${c.version})</option>`).join('');
                    pendingHTML = `
                        <select id="sel_${data.id}" class="redeem-select">
                            <option value="" disabled selected>-- 選擇要發放的卡 --</option>
                            ${options}
                        </select>
                        <button class="btn-redeem" onclick="quickRedeem('${data.id}')">✨ 確認兌換</button>
                    `;
                }

                let redeemedHTML = redeemedCards.length > 0 
                    ? redeemedCards.slice(0, 5).map(c => `<span class="card-tag">${c.name}</span>`).join('') + (redeemedCards.length > 5 ? '...' : '')
                    : `<span style="color:#ccc; font-size:12px;">尚未有兌換紀錄</span>`;

                invBody.innerHTML += `
                    <tr>
                        <td><strong>${data.id}</strong><br><span style="font-size:14px; color:#555;">${data.name || ''}</span></td>
                        <td>${pendingHTML}</td>
                        <td>${redeemedHTML}</td>
                    </tr>
                `;
            });
        }

        // ================= 戰術操作邏輯 =================
        window.execAction = async function(id, val) {
            try { await updateDoc(doc(db, "students", id), { score: increment(val), gold: increment(val * 10) }); } 
            catch(e) { console.error("加分失敗", e); }
        };

        window.deleteStudent = async function(id) {
            if(confirm(`【年度重置】確定抹除兵籍「${id}」？`)) await deleteDoc(doc(db, "students", id));
        };

        window.quickRedeem = async function(stuId) {
            const selectEl = document.getElementById(`sel_${stuId}`);
            if(!selectEl || !selectEl.value) return alert("請先從下拉選單選擇一張卡牌！");
            
            const targetInstanceId = selectEl.value;
            try {
                const ref = doc(db, "students", stuId);
                const snap = await getDoc(ref);
                let cards = snap.data().cards || [];
                
                const idx = cards.findIndex(c => c.instanceId === targetInstanceId || `old_${c.name}` === targetInstanceId);
                if(idx !== -1) { 
                    cards[idx].redeemed = true; 
                    cards[idx].redeemTime = new Date().toLocaleString(); 
                    await updateDoc(ref, { cards: cards }); 
                }
            } catch(e) { console.error("兌換失敗", e); }
        };

        // 功課紀律 Modal 邏輯 
        let currentTargetStudentId = null;
        window.closeModal = function(id) { document.getElementById(id).style.display = "none"; currentTargetStudentId = null; };
        
        window.openDiscModal = function(stuId, stuName) {
            currentTargetStudentId = stuId;
            document.getElementById('discModalTitle').innerText = `📜 [${stuId}] ${stuName} 的功課紀律`;
            document.getElementById('hwTitleInput').value = ''; 
            document.getElementById('disciplineModal').style.display = "block";
            renderDiscData(); 
        };

        window.addAssignment = async function(type) {
            const title = document.getElementById('hwTitleInput').value.trim();
            if (!title || !currentTargetStudentId) return alert("請輸入作業名稱！");
            const newAssignment = { id: Date.now().toString(), title: title, type: type, status: 'pending', date: new Date().toLocaleDateString() };
            try {
                const ref = doc(db, "students", currentTargetStudentId);
                const snap = await getDoc(ref); let assignments = snap.data().assignments || []; assignments.push(newAssignment);
                let updates = { assignments: assignments };
                if (type === 'missing') { updates.score = increment(-2); updates.gold = increment(-20); updates.missingHw = increment(1); } else { updates.leaveDays = increment(1); }
                await updateDoc(ref, updates); document.getElementById('hwTitleInput').value = ''; renderDiscData(); 
            } catch (e) { console.error("新增失敗", e); }
        };

        async function renderDiscData() {
            if(!currentTargetStudentId) return;
            const snap = await getDoc(doc(db, "students", currentTargetStudentId));
            const assignments = snap.data().assignments || [];
            const pList = document.getElementById('pendingHwList'); const rList = document.getElementById('resolvedHwList');
            pList.innerHTML = ''; rList.innerHTML = '';
            [...assignments].reverse().forEach(hw => {
                if(hw.status === 'pending') {
                    pList.innerHTML += `<div class="inv-item"><div><strong>${hw.title}</strong> <span style="font-size:12px;color:#888;">(${hw.type==='missing'?'欠交':'請假'})</span></div><button class="btn-sm btn-p1" onclick="resolveHw('${hw.id}')">☑️ 補交</button></div>`;
                } else {
                    rList.innerHTML += `<div class="inv-item resolved"><div><strong style="text-decoration:line-through;color:#aaa;">${hw.title}</strong></div><span style="color:#2ecc71;font-size:12px;">已結案</span></div>`;
                }
            });
        }
        
        window.resolveHw = async function(hwId) {
            try {
                const ref = doc(db, "students", currentTargetStudentId); const snap = await getDoc(ref);
                let assignments = snap.data().assignments || [];
                const idx = assignments.findIndex(a => a.id === hwId);
                if(idx !== -1) { assignments[idx].status = 'resolved'; await updateDoc(ref, { assignments: assignments }); renderDiscData(); }
            } catch(e) { console.error("補交失敗", e); }
        };

        // 基礎建檔批次邏輯
        document.getElementById('addBtn').addEventListener('click', async () => {
            const id = document.getElementById('stuId').value.trim(); const name = document.getElementById('stuName').value.trim(); const cls = document.getElementById('stuClass').value;
            if (id && name) { await setDoc(doc(db, "students", id), { name: name, class: cls }, { merge: true }); document.getElementById('stuId').value = ''; document.getElementById('stuName').value = ''; }
        });
        document.getElementById('batchBtn').addEventListener('click', async () => {
            const cls = document.getElementById('batchClassSelect').value; const raw = document.getElementById('batchData').value.trim();
            if (!raw) return; const lines = raw.split('\n');
            for (let l of lines) { const p = l.split(/\t+|\s+/); if(p.length>=2) await setDoc(doc(db, "students", p[0].trim()), { name: p[1].trim(), class: cls, score: 0, gold: 0 }, { merge: true }); }
            document.getElementById('batchData').value = '';
        });
        document.getElementById('batchCardBtn').addEventListener('click', async () => {
            const raw = document.getElementById('batchCardData').value.trim();
            if (!raw) return; const lines = raw.split('\n');
            for (let l of lines) { const p = l.split(/\t+|\s+/); if(p.length>=3) await setDoc(doc(db, "cards", p[0].trim()), { name: p[1].trim(), version: p[2].trim() }, { merge: true }); }
            document.getElementById('batchCardData').value = '';
        });
    </script>
</body>
</html>
