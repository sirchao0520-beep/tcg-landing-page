<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年制語文 TCG - 最高中控台 V2.3</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00ffcc; border-bottom: 2px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h2 { color: #9b59b6; border-bottom: 1px dashed #555; padding-bottom: 5px; margin-top: 40px; }
        
        select.class-filter { background: #2a2a2a; color: #00ffcc; border: 1px solid #00ffcc; padding: 5px 10px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        
        .grid-panel { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 20px; }
        .form-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        h3 { margin-top: 0; font-size: 16px; margin-bottom: 10px; }
        .title-troop { color: #f39c12; }
        .title-card { color: #9b59b6; }
        
        input, textarea, select { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; width: calc(100% - 18px); margin-bottom: 10px; font-family: monospace; }
        textarea { height: 80px; resize: none; }
        input:focus, textarea:focus, select:focus { border-color: #00ffcc; outline: none; }
        
        button { background: #00ffcc; color: #121212; border: none; padding: 8px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #00b38f; }
        
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; font-size: 14px; }
        th { background-color: #2a2a2a; color: #00ffcc; white-space: nowrap; }
        
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-btn { width: auto; padding: 4px 8px; font-size: 12px; border-radius: 3px; }
        
        .btn-score-up { background: #3498db; color: #fff; } 
        .btn-score-down { background: #e74c3c; color: #fff; } 
        .btn-hw { background: #9b59b6; color: #fff; } 
        .btn-leave { background: #95a5a6; color: #121212; } 
        .btn-delete { background: #555; color: #ff6b6b; border: 1px solid #ff6b6b; } 
        .btn-delete:hover { background: #ff6b6b; color: #fff; }
        
        .stat-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; background: #333; margin-left: 5px; }
        .warn-text { color: #e74c3c; }
        .version-tag { color: #9b59b6; font-size: 12px; border: 1px solid #9b59b6; padding: 2px 4px; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            天工督軍 - 部隊作戰面板 
            <select id="viewClassFilter" class="class-filter">
                <option value="ALL">顯示全部兵力</option>
                <option value="A班">僅顯示 A班</option>
                <option value="B班">僅顯示 B班</option>
                <option value="C班">僅顯示 C班</option>
                <option value="">顯示「未編編」或異常資料</option>
            </select>
        </h1>
        
        <div class="grid-panel">
            <div class="form-box" style="border-color: #f39c12;">
                <h3 class="title-troop">閃電擴軍 (從 Excel 複製貼上)</h3>
                <select id="batchClassSelect" style="width: 100%;"><option value="A班">目標編制：A班</option><option value="B班">目標編制：B班</option><option value="C班">目標編制：C班</option></select>
                <textarea id="batchData" placeholder="格式需為：學號 [Tab] 姓名&#10;S001 諸葛亮"></textarea>
                <button id="batchBtn" style="background: #f39c12; color: #fff;">批次注入指定班級</button>
            </div>
            <div class="form-box">
                <h3 class="title-troop">單兵特招 / 資料修正</h3>
                <div style="display:flex; gap:10px;">
                    <select id="stuClass" style="width:30%; margin:0;"><option value="A班">A班</option><option value="B班">B班</option><option value="C班">C班</option></select>
                    <input type="text" id="stuId" placeholder="學號" style="width:30%; margin:0;" />
                    <input type="text" id="stuName" placeholder="姓名" style="width:40%; margin:0;" />
                </div>
                <button id="addBtn" style="margin-top: 10px;">建檔 / 更新資料</button>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>學號</th><th>姓名</th><th>班級</th><th>積分</th><th>金幣</th><th>行政紀錄</th><th>戰術決策面板</th></tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>

        <h2>兵器庫 - 卡牌原型控制台</h2>
        
        <div class="grid-panel">
            <div class="form-box" style="border-color: #9b59b6;">
                <h3 class="title-card">閃電鑄造卡牌 (從 Excel 複製貼上)</h3>
                <p style="font-size: 12px; color: #aaa; margin-top: 0;">※ 若卡牌編號已存在，將自動覆蓋更新其名稱與版本。</p>
                <textarea id="batchCardData" placeholder="格式需為：編號 [Tab] 名稱 [Tab] 版本&#10;V1-01 基礎標點卡 原始版1.0&#10;V1-02 詞彙擴充卡 擴張包1.5"></textarea>
                <button id="batchCardBtn" style="background: #9b59b6; color: #fff;">批次鑄造入庫</button>
            </div>

            <div class="form-box">
                <h3 class="title-card">單卡鑄造 / 資料修正</h3>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="cardId" placeholder="編號 (例: V1-01)" style="width:40%; margin:0;" />
                        <input type="text" id="cardName" placeholder="名稱 (例: 標點卡)" style="width:60%; margin:0;" />
                    </div>
                    <input type="text" id="cardVersion" list="versionOptions" placeholder="選擇或輸入版本" style="width:100%; margin:0;" />
                    <datalist id="versionOptions">
                        <option value="原始版1.0"></option>
                        <option value="擴張包1.5"></option>
                    </datalist>
                </div>
                <button id="addCardBtn" style="background: #9b59b6; color: #fff; margin-top: 10px;">鑄造入庫 / 覆蓋更新</button>
            </div>
        </div>

        <table>
            <thead>
                <tr><th>卡牌編號</th><th>卡牌名稱</th><th>所屬版本</th><th>兵器庫管理</th></tr>
            </thead>
            <tbody id="cardTableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 替換為您的 Firebase 金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCZ7b0hjgkTMUTTNRDAjkcAMR374BH1c-o",
            authDomain: "language-tcg-db.firebaseapp.com",
            projectId: "language-tcg-db",
            storageBucket: "language-tcg-db.firebasestorage.app",
            messagingSenderId: "517995107179",
            appId: "1:517995107179:web:b326458b66991b97f2322e"
        };
        // ==========================================
     

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // --- 模組 A：部隊管理 ---
        const tableBody = document.getElementById('studentTableBody');
        const viewClassFilter = document.getElementById('viewClassFilter');
        let allStudentsData = [];

        onSnapshot(collection(db, "students"), (snapshot) => {
            allStudentsData = [];
            snapshot.forEach((doc) => { allStudentsData.push({ id: doc.id, ...doc.data() }); });
            renderTable(); 
        });

        viewClassFilter.addEventListener('change', renderTable);

        function renderTable() {
            const currentFilter = viewClassFilter.value;
            tableBody.innerHTML = '';
            const filteredData = allStudentsData.filter(s => currentFilter === "ALL" || (currentFilter === "" && !s.class) || s.class === currentFilter);
            filteredData.sort((a, b) => {
                if(a.class === b.class) return a.id.localeCompare(b.id);
                return (a.class || "").localeCompare(b.class || "");
            });

            filteredData.forEach((data) => {
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${data.id}</strong></td><td>${data.name || ''}</td><td style="color:#aaa;">${data.class || '未編編'}</td>
                        <td style="color:#3498db; font-weight:bold; font-size:16px;">${data.score || 0}</td><td style="color:#f1c40f; font-weight:bold;">${data.gold || 0}</td>
                        <td><div class="stat-badge ${data.missingHw > 0 ? 'warn-text' : ''}">欠交: ${data.missingHw || 0}</div><div class="stat-badge">請假: ${data.leaveDays || 0}</div></td>
                        <td>
                            <div class="btn-group">
                                <button class="action-btn btn-score-up" onclick="execAction('students', '${data.id}', 'addScore', 1)">+1</button>
                                <button class="action-btn btn-score-up" onclick="execAction('students', '${data.id}', 'addScore', 2)">+2</button>
                                <button class="action-btn btn-score-up" onclick="execAction('students', '${data.id}', 'addScore', 5)">+5</button>
                                <button class="action-btn btn-score-down" onclick="execAction('students', '${data.id}', 'addScore', -1)">-1</button>
                                <span style="color:#444; margin:0 2px;">|</span>
                                <button class="action-btn btn-hw" onclick="execAction('students', '${data.id}', 'missingHw')">欠交</button>
                                <button class="action-btn btn-leave" onclick="execAction('students', '${data.id}', 'leave')">請假</button>
                                <span style="color:#444; margin:0 2px;">|</span>
                                <button class="action-btn btn-delete" onclick="execAction('students', '${data.id}', 'delete')">抹除</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

window.execAction = async function(collectionName, id, action, val) {
            const ref = doc(db, collectionName, id);
            try {
                if(action === 'addScore') {
                    // 【核心升級】：同步增加積分，並自動計算 10 倍金幣
                    await updateDoc(ref, { 
                        score: increment(val), 
                        gold: increment(val * 10) 
                    });
                }
                else if(action === 'missingHw') {
                    // 【核心升級】：欠交扣 2 分，同步懲罰扣 20 金幣
                    await updateDoc(ref, { 
                        missingHw: increment(1), 
                        score: increment(-2),
                        gold: increment(-20) 
                    });
                }
                else if(action === 'leave') {
                    await updateDoc(ref, { leaveDays: increment(1) });
                }
                else if(action === 'delete') {
                    if(confirm(`【危險操作】確定要將「${id}」徹底抹除嗎？`)) await deleteDoc(ref);
                }
            } catch(e) { console.error("執行失敗", e); }
        };

        document.getElementById('addBtn').addEventListener('click', async () => {
            const id = document.getElementById('stuId').value.trim(); const name = document.getElementById('stuName').value.trim(); const cls = document.getElementById('stuClass').value;
            if (!id || !name) return alert("學號與姓名必填！");
            await setDoc(doc(db, "students", id), { name: name, class: cls }, { merge: true });
            document.getElementById('stuId').value = ''; document.getElementById('stuName').value = '';
        });

        document.getElementById('batchBtn').addEventListener('click', async () => {
            const targetClass = document.getElementById('batchClassSelect').value; const rawData = document.getElementById('batchData').value.trim();
            if (!rawData) return;
            const lines = rawData.split('\n'); let successCount = 0;
            for (let line of lines) {
                const parts = line.split('\t'); // Excel 複製標準分隔符
                let parsed = parts.length >= 2 ? parts : line.split(/\s+/);
                if (parsed.length >= 2 && parsed[0].trim() && parsed[1].trim()) {
                    await setDoc(doc(db, "students", parsed[0].trim()), { name: parsed[1].trim(), class: targetClass, score: 0, gold: 0, missingHw: 0, leaveDays: 0, cards: [] }, { merge: true });
                    successCount++;
                }
            }
            alert(`匯入 ${successCount} 筆資料至 ${targetClass}。`); document.getElementById('batchData').value = '';
        });

        // --- 模組 B：兵器庫 (卡牌系統) ---
        const cardTableBody = document.getElementById('cardTableBody');
        
        onSnapshot(collection(db, "cards"), (snapshot) => {
            cardTableBody.innerHTML = '';
            let cardsData = [];
            snapshot.forEach((doc) => { cardsData.push({ id: doc.id, ...doc.data() }); });
            cardsData.sort((a, b) => a.id.localeCompare(b.id));

            cardsData.forEach((data) => {
                cardTableBody.innerHTML += `
                    <tr>
                        <td><strong>${data.id}</strong></td>
                        <td style="color:#00ffcc;">${data.name}</td>
                        <td><span class="version-tag">${data.version}</span></td>
                        <td><button class="action-btn btn-delete" onclick="execAction('cards', '${data.id}', 'delete')">銷毀模版</button></td>
                    </tr>
                `;
            });
        });

        document.getElementById('addCardBtn').addEventListener('click', async () => {
            const id = document.getElementById('cardId').value.trim();
            const name = document.getElementById('cardName').value.trim();
            const version = document.getElementById('cardVersion').value.trim();
            if (!id || !name || !version) { alert("卡牌編號、名稱與版本皆為必填！"); return; }
            try {
                await setDoc(doc(db, "cards", id), { name: name, version: version }, { merge: true });
                document.getElementById('cardId').value = ''; document.getElementById('cardName').value = ''; 
            } catch(e) { console.error("卡牌鑄造失敗", e); }
        });

        // 【全新核心：兵器庫批量匯入解析引擎】
        document.getElementById('batchCardBtn').addEventListener('click', async () => {
            const rawData = document.getElementById('batchCardData').value.trim();
            if (!rawData) { alert("請先貼上資料！"); return; }
            
            const lines = rawData.split('\n');
            let successCount = 0;

            for (let line of lines) {
                // Excel 複製預設為 Tab (\t) 分隔
                const parts = line.split('\t'); 
                let parsed = parts;
                
                // 若手動輸入使用空格，退回使用正則匹配空格，但這可能會截斷帶有空格的卡牌名稱
                if(parsed.length < 3) {
                    parsed = line.split(/\s+/);
                }

                if (parsed.length >= 3) {
                    const id = parsed[0].trim(); 
                    const name = parsed[1].trim();
                    const version = parsed[2].trim();
                    
                    if (id && name && version) {
                        try {
                            await setDoc(doc(db, "cards", id), {
                                name: name, version: version
                            }, { merge: true });
                            successCount++;
                        } catch (e) { console.error("鑄造失敗:", id, e); }
                    }
                }
            }
            alert(`擴張包鑄造完畢！成功匯入 ${successCount} 張卡牌。`);
            document.getElementById('batchCardData').value = '';
        });
    </script>
</body>
</html>
