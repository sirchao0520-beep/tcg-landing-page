<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年制語文 TCG - 最高中控台 V2</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #00ffcc; border-bottom: 2px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 班級過濾器 */
        select.class-filter { background: #2a2a2a; color: #00ffcc; border: 1px solid #00ffcc; padding: 5px 10px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        
        .grid-panel { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-bottom: 20px; }
        .form-box { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        h3 { margin-top: 0; color: #f39c12; font-size: 16px; margin-bottom: 10px; }
        
        input, textarea, select { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; width: calc(100% - 18px); margin-bottom: 10px; font-family: monospace; }
        textarea { height: 80px; resize: none; }
        input:focus, textarea:focus, select:focus { border-color: #00ffcc; outline: none; }
        
        button { background: #00ffcc; color: #121212; border: none; padding: 8px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #00b38f; }
        
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333; font-size: 14px; }
        th { background-color: #2a2a2a; color: #00ffcc; white-space: nowrap; }
        
        /* 按鈕群組排版 */
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .action-btn { width: auto; padding: 4px 8px; font-size: 12px; border-radius: 3px; }
        
        /* 按鈕顏色戰略配置 */
        .btn-score-up { background: #3498db; color: #fff; } /* 藍色系加分 */
        .btn-score-down { background: #e74c3c; color: #fff; } /* 紅色系扣分 */
        .btn-hw { background: #9b59b6; color: #fff; } /* 紫色欠交 */
        .btn-leave { background: #95a5a6; color: #121212; } /* 灰色請假 */
        .btn-gold { background: #f1c40f; color: #121212; }
        
        .stat-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; background: #333; margin-left: 5px; }
        .warn-text { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>
            天工督軍 - 最高中控台 
            <select id="viewClassFilter" class="class-filter">
                <option value="ALL">顯示全部兵力</option>
                <option value="A班">僅顯示 A班</option>
                <option value="B班">僅顯示 B班</option>
                <option value="C班">僅顯示 C班</option>
            </select>
        </h1>
        
        <div class="grid-panel">
            <div class="form-box" style="border-color: #f39c12;">
                <h3>閃電擴軍 (從 Excel 複製貼上)</h3>
                <select id="batchClassSelect" style="width: 100%;">
                    <option value="A班">目標編制：A班</option>
                    <option value="B班">目標編制：B班</option>
                    <option value="C班">目標編制：C班</option>
                </select>
                <textarea id="batchData" placeholder="格式需為：學號 [Tab] 姓名 (無須包含班級)&#10;S001 諸葛亮"></textarea>
                <button id="batchBtn" style="background: #f39c12; color: #fff;">批次注入指定班級</button>
            </div>

            <div class="form-box">
                <h3>單兵特招入庫</h3>
                <div style="display:flex; gap:10px;">
                    <select id="stuClass" style="width:30%; margin:0;"><option value="A班">A班</option><option value="B班">B班</option><option value="C班">C班</option></select>
                    <input type="text" id="stuId" placeholder="學號" style="width:30%; margin:0;" />
                    <input type="text" id="stuName" placeholder="姓名" style="width:40%; margin:0;" />
                </div>
                <button id="addBtn" style="margin-top: 10px;">單獨建檔</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>學號</th><th>姓名</th><th>班級</th>
                    <th>積分</th><th>金幣</th>
                    <th>行政紀錄</th>
                    <th>戰術決策面板 (加扣分/紀錄)</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 替換為您的 Firebase 金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCZ7b0hjgkTMUTTNRDAjkcAMR374BH1c-o",
            authDomain: "language-tcg-db.firebaseapp.com",
            projectId: "language-tcg-db",
            storageBucket: "language-tcg-db.firebasestorage.app",
            messagingSenderId: "517995107179",
            appId: "1:517995107179:web:b326458b66991b97f2322e"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tableBody = document.getElementById('studentTableBody');
        const viewClassFilter = document.getElementById('viewClassFilter');
        
        let allStudentsData = []; // 暫存所有學生數據供前端快速過濾

        // 【全量監聽與本地過濾渲染】
        onSnapshot(collection(db, "students"), (snapshot) => {
            allStudentsData = [];
            snapshot.forEach((doc) => {
                allStudentsData.push({ id: doc.id, ...doc.data() });
            });
            renderTable(); // 觸發畫面更新
        });

        // 監聽下拉選單變化
        viewClassFilter.addEventListener('change', renderTable);

        // 渲染函數
        function renderTable() {
            const currentFilter = viewClassFilter.value;
            tableBody.innerHTML = '';
            
            // 根據選單過濾班級
            const filteredData = allStudentsData.filter(student => {
                if (currentFilter === "ALL") return true;
                return student.class === currentFilter;
            });

            // 排序：先按班級，再按學號 (字母順序)
            filteredData.sort((a, b) => {
                if(a.class === b.class) return a.id.localeCompare(b.id);
                return (a.class || "").localeCompare(b.class || "");
            });

            filteredData.forEach((data) => {
                tableBody.innerHTML += `
                    <tr>
                        <td><strong>${data.id}</strong></td><td>${data.name || ''}</td>
                        <td style="color:#aaa;">${data.class || '未編編'}</td>
                        <td style="color:#3498db; font-weight:bold; font-size:16px;">${data.score || 0}</td>
                        <td style="color:#f1c40f; font-weight:bold;">${data.gold || 0}</td>
                        <td>
                            <div class="stat-badge ${data.missingHw > 0 ? 'warn-text' : ''}">欠交: ${data.missingHw || 0}</div>
                            <div class="stat-badge">請假: ${data.leaveDays || 0}</div>
                        </td>
                        <td>
                            <div class="btn-group">
                                <button class="action-btn btn-score-up" data-id="${data.id}" data-action="addScore" data-val="1">+1</button>
                                <button class="action-btn btn-score-up" data-id="${data.id}" data-action="addScore" data-val="2">+2</button>
                                <button class="action-btn btn-score-up" data-id="${data.id}" data-action="addScore" data-val="5">+5</button>
                                <button class="action-btn btn-score-down" data-id="${data.id}" data-action="addScore" data-val="-1">-1</button>
                                <span style="color:#444; margin:0 2px;">|</span>
                                <button class="action-btn btn-hw" data-id="${data.id}" data-action="missingHw">欠交(-2分)</button>
                                <button class="action-btn btn-leave" data-id="${data.id}" data-action="leave">請假</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // 【全新核心：帶有班級屬性的批量匯入】
        document.getElementById('batchBtn').addEventListener('click', async () => {
            const targetClass = document.getElementById('batchClassSelect').value;
            const rawData = document.getElementById('batchData').value.trim();
            if (!rawData) { alert("請先貼上資料！"); return; }
            
            const lines = rawData.split('\n');
            let successCount = 0;

            for (let line of lines) {
                const parts = line.split(/\t+|\s+/); 
                if (parts.length >= 2) {
                    const id = parts[0].trim(); const name = parts[1].trim();
                    if (id && name) {
                        try {
                            // 初始化數據包含 class, missingHw, leaveDays
                            await setDoc(doc(db, "students", id), {
                                name: name, class: targetClass, score: 0, gold: 0, missingHw: 0, leaveDays: 0, cards: []
                            }, { merge: true });
                            successCount++;
                        } catch (e) { console.error("寫入失敗:", id, e); }
                    }
                }
            }
            alert(`【${targetClass}】擴軍完畢！成功匯入 ${successCount} 筆資料。`);
            document.getElementById('batchData').value = '';
        });

        // 單兵入庫
        document.getElementById('addBtn').addEventListener('click', async () => {
            const id = document.getElementById('stuId').value.trim();
            const name = document.getElementById('stuName').value.trim();
            const cls = document.getElementById('stuClass').value;
            if (!id || !name) return alert("學號與姓名必填！");
            await setDoc(doc(db, "students", id), { name: name, class: cls, score: 0, gold: 0, missingHw: 0, leaveDays: 0, cards: [] }, { merge: true });
            document.getElementById('stuId').value = ''; document.getElementById('stuName').value = '';
        });

        // 【複合原子操作：按鈕事件委派】
        tableBody.addEventListener('click', async (e) => {
            if (!e.target.classList.contains('action-btn')) return;
            const id = e.target.getAttribute('data-id');
            const action = e.target.getAttribute('data-action');
            const studentRef = doc(db, "students", id);
            
            try {
                if (action === "addScore") {
                    const val = parseInt(e.target.getAttribute('data-val'), 10);
                    await updateDoc(studentRef, { score: increment(val) });
                } 
                else if (action === "missingHw") {
                    // 複合操作：欠交次數+1，同時分數-2
                    await updateDoc(studentRef, { missingHw: increment(1), score: increment(-2) });
                } 
                else if (action === "leave") {
                    // 單純操作：請假次數+1
                    await updateDoc(studentRef, { leaveDays: increment(1) });
                }
            } catch (err) { console.error("指令執行失敗:", err); }
        });
    </script>
</body>
</html>
