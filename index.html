<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年制語文 TCG - 教師中控台</title>
    <style>
        body {
            background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00ffcc; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* 表單區塊 */
        .form-box {
            background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            display: flex; gap: 10px; align-items: center; border: 1px solid #333;
        }
        input {
            background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; 
            border-radius: 4px; flex: 1; font-size: 14px;
        }
        input:focus { border-color: #00ffcc; outline: none; }
        button.add-btn {
            background: #00ffcc; color: #121212; border: none; padding: 10px 20px;
            font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        button.add-btn:hover { background: #00b38f; }

        /* 學生列表表格 */
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2a2a2a; color: #00ffcc; font-weight: 600; }
        tr:hover { background-color: #252525; }
        
        /* 操控按鈕組 */
        .btn-group { display: flex; gap: 5px; }
        .action-btn {
            border: none; padding: 6px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .btn-score { background: #f39c12; color: #fff; }
        .btn-score:hover { background: #d35400; }
        .btn-gold { background: #f1c40f; color: #121212; }
        .btn-gold:hover { background: #f39c12; }
        
        .status-tag { color: #888; font-size: 12px; margin-top: 5px; text-align: right; }
    </style>
</head>
<body>

    <div class="container">
        <h1>天工督軍 - 教師運作中控台</h1>
        
        <div class="form-box">
            <input type="text" id="stuId" placeholder="輸入學號 (例如: S001)" />
            <input type="text" id="stuName" placeholder="輸入學生姓名" />
            <button class="add-btn" id="addBtn">建檔入庫</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>學號</th>
                    <th>姓名</th>
                    <th>語文積分 (Score)</th>
                    <th>持有金幣 (Gold)</th>
                    <th>決策控制台</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                </tbody>
        </table>
        
        <div class="status-tag" id="syncStatus">雲端同步狀態：安全連線中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 主公！請將下方大括號內的內容，精準替換成您在 Firebase 複製的金鑰！
        // ==========================================
               const firebaseConfig = {
  apiKey: "AIzaSyCZ7b0hjgkTMUTTNRDAjkcAMR374BH1c-o",
  authDomain: "language-tcg-db.firebaseapp.com",
  projectId: "language-tcg-db",
  storageBucket: "language-tcg-db.firebasestorage.app",
  messagingSenderId: "517995107179",
  appId: "1:517995107179:web:b326458b66991b97f2322e"
};
     
        // ==========================================

        // 初始化資料庫
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tableBody = document.getElementById('studentTableBody');
        const syncStatus = document.getElementById('syncStatus');

        // 【核心機制：全量即時監聽】
        // 只要雲端有任何風吹草動，此函式會自動觸發，網頁完全不需重新整理
        onSnapshot(collection(db, "students"), (snapshot) => {
            tableBody.innerHTML = ''; // 清空舊畫面
            
            if (snapshot.empty) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#666;">目前無學生資料，請由上方建檔。</td></tr>`;
                return;
            }

            snapshot.forEach((studentDoc) => {
                const id = studentDoc.id;
                const data = studentDoc.data();
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${id}</strong></td>
                    <td>${data.name || '未命名'}</td>
                    <td style="color:#f39c12; font-weight:bold;">${data.score || 0} 分</td>
                    <td style="color:#f1c40f; font-weight:bold;">${data.gold || 0} 🪙</td>
                    <td>
                        <div class="btn-group">
                            <button class="action-btn btn-score" data-id="${id}" data-type="score" data-val="10">+10 分</button>
                            <button class="action-btn btn-score" data-id="${id}" data-type="score" data-val="-10">-10 分</button>
                            <button class="action-btn btn-gold" data-id="${id}" data-type="gold" data-val="50">+50 金幣</button>
                            <button class="action-btn btn-gold" data-id="${id}" data-type="gold" data-val="-50">-50 金幣</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
            syncStatus.innerText = "雲端同步狀態：數據已達最新狀態 (" + new Date().toLocaleTimeString() + ")";
        }, (error) => {
            syncStatus.innerText = "⚠️ 同步異常: " + error.message;
        });

        // 【操作機制一：新增學生】
        document.getElementById('addBtn').addEventListener('click', async () => {
            const id = document.getElementById('stuId').value.trim();
            const name = document.getElementById('stuName').value.trim();
            
            if (!id || !name) {
                alert("學號與姓名皆為必填戰略物資！");
                return;
            }

            try {
                // 初始化學生基本盤
                await setDoc(doc(db, "students", id), {
                    name: name,
                    score: 0,
                    gold: 100, // 初始發放 100 金幣
                    cards: []
                });
                // 清空輸入框
                document.getElementById('stuId').value = '';
                document.getElementById('stuName').value = '';
            } catch (err) {
                alert("建檔失敗: " + err.message);
            }
        });

        // 【操作機制二：動態按鈕事件監聽】
        // 利用事件代理機制，確保動態產生的按鈕皆能精準控制
        tableBody.addEventListener('click', async (e) => {
            if (!e.target.classList.contains('action-btn')) return;
            
            const id = e.target.getAttribute('data-id');
            const type = e.target.getAttribute('data-type'); // 'score' 或 'gold'
            const val = parseInt(e.target.getAttribute('data-val'), 10);

            const studentRef = doc(db, "students", id);
            
            try {
                // 使用 Firestore 的原子增量函數，防止多人同時讀寫造成的數據衝突
                await updateDoc(studentRef, {
                    [type]: increment(val)
                });
            } catch (err) {
                console.error("更新失敗:", err);
            }
        });
    </script>
</body>
</html>
