<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六年制語文 TCG - 學生裝備總署 V1.1</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1 { color: #00ffcc; border-bottom: 2px solid #333; padding-bottom: 10px; text-align: center; }
        
        #loginPanel { background: #1e1e1e; padding: 30px; border-radius: 8px; border: 1px solid #333; text-align: center; margin-top: 50px; }
        input { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 4px; width: 80%; font-size: 18px; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        input:focus { border-color: #00ffcc; outline: none; }
        .btn-login { background: #00ffcc; color: #121212; border: none; padding: 12px 30px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-login:hover { background: #00b38f; }

        #dashboardPanel { display: none; }
        .status-card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .profile { display: flex; flex-direction: column; }
        .stu-name { font-size: 24px; font-weight: bold; color: #fff; }
        .stu-id { font-size: 14px; color: #888; }
        .stats { display: flex; gap: 20px; text-align: center; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; color: #aaa; }
        .score-text { color: #3498db; }
        .gold-text { color: #f1c40f; }

        .gacha-box { background: linear-gradient(145deg, #2c1e3e, #1e1e1e); padding: 20px; border-radius: 8px; border: 1px solid #9b59b6; text-align: center; margin-bottom: 20px; }
        .gacha-cost { color: #f1c40f; font-size: 14px; margin-bottom: 10px; }
        .btn-gacha { background: #9b59b6; color: #fff; border: none; padding: 15px 40px; font-weight: bold; border-radius: 50px; cursor: pointer; font-size: 18px; transition: 0.1s; box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4); }
        .btn-gacha:active { transform: scale(0.95); box-shadow: 0 2px 5px rgba(155, 89, 182, 0.4); }
        .btn-gacha:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; }
        #pullResult { margin-top: 15px; font-size: 18px; font-weight: bold; color: #00ffcc; min-height: 25px; }

        h3 { color: #aaa; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .card-placeholder { background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 15px; text-align: center; min-height: 80px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .card-name { font-weight: bold; color: #00ffcc; font-size: 14px; margin-bottom: 5px; }
        .card-version { font-size: 10px; color: #9b59b6; border: 1px solid #9b59b6; border-radius: 3px; padding: 2px 4px; display: inline-block; }
        
        /* 狀態標籤 */
        .status-badge { position: absolute; top: -5px; right: -5px; font-size: 10px; padding: 3px 6px; border-radius: 10px; font-weight: bold; }
        .status-pending { background: #e74c3c; color: #fff; }
        .status-redeemed { background: #2ecc71; color: #121212; }
    </style>
</head>
<body>

    <div class="container">
        <h1>天工督軍 - 士兵裝備總署</h1>
        <div id="loginPanel">
            <h2 style="color: #fff; margin-top: 0;">兵籍認證</h2>
            <input type="text" id="loginId" placeholder="輸入學號 (如 A01)" />
            <br>
            <button class="btn-login" id="loginBtn">連線認證</button>
            <div id="loginError" style="color: #e74c3c; margin-top: 15px; font-size: 14px; display: none;">⚠️ 查無此兵籍。</div>
        </div>

        <div id="dashboardPanel">
            <div class="status-card">
                <div class="profile"><span class="stu-name" id="uiName">載入中...</span><span class="stu-id" id="uiId">ID: ---</span></div>
                <div class="stats">
                    <div class="stat-box"><span class="stat-value score-text" id="uiScore">0</span><span class="stat-label">累積總積分</span></div>
                    <div class="stat-box"><span class="stat-value gold-text" id="uiGold">0</span><span class="stat-label">可兌換金幣</span></div>
                </div>
            </div>

            <div class="gacha-box">
                <div class="gacha-cost">每抽消耗：<strong style="font-size: 18px;">50</strong> 金幣</div>
                <button class="btn-gacha" id="gachaBtn">啟動天工抽卡引擎</button>
                <div id="pullResult"></div>
            </div>

            <h3>已獲得卡牌 (<span id="cardCount">0</span>)</h3>
            <div class="inventory-grid" id="inventoryGrid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, getDocs, collection, onSnapshot, updateDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ==========================================
        // ⚠️ 替換為您的 Firebase 金鑰
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCZ7b0hjgkTMUTTNRDAjkcAMR374BH1c-o",
            authDomain: "language-tcg-db.firebaseapp.com",
            projectId: "language-tcg-db",
            storageBucket: "language-tcg-db.firebasestorage.app",
            messagingSenderId: "517995107179",
            appId: "1:517995107179:web:b326458b66991b97f2322e"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const loginPanel = document.getElementById('loginPanel');
        const dashboardPanel = document.getElementById('dashboardPanel');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const gachaBtn = document.getElementById('gachaBtn');
        const pullResult = document.getElementById('pullResult');
        
        const DRAW_COST = 50; 
        let currentStudentId = null;
        let gachaPool = []; 

        loginBtn.addEventListener('click', async () => {
            const stuId = document.getElementById('loginId').value.trim();
            if (!stuId) return;
            loginBtn.innerText = "驗證中...";
            try {
                const docSnap = await getDoc(doc(db, "students", stuId));
                if (docSnap.exists()) {
                    currentStudentId = stuId;
                    loginError.style.display = 'none'; loginPanel.style.display = 'none'; dashboardPanel.style.display = 'block';
                    await loadGachaPool(); startStudentListener(stuId);
                } else {
                    loginError.style.display = 'block'; loginBtn.innerText = "連線認證";
                }
            } catch (e) { console.error("登入錯誤:", e); loginBtn.innerText = "連線認證"; }
        });

        async function loadGachaPool() {
            const querySnapshot = await getDocs(collection(db, "cards"));
            gachaPool = [];
            querySnapshot.forEach((doc) => { gachaPool.push({ id: doc.id, name: doc.data().name, version: doc.data().version }); });
        }

        function startStudentListener(stuId) {
            onSnapshot(doc(db, "students", stuId), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('uiName').innerText = data.name || '未命名';
                    document.getElementById('uiId').innerText = `ID: ${stuId} | ${data.class || '未編編'}`;
                    document.getElementById('uiScore').innerText = data.score || 0;
                    const gold = data.gold || 0;
                    document.getElementById('uiGold').innerText = gold;

                    gachaBtn.disabled = gold < DRAW_COST;
                    gachaBtn.innerText = gold < DRAW_COST ? `金幣不足 (${gold}/${DRAW_COST})` : `啟動天工抽卡引擎`;

                    const inventoryGrid = document.getElementById('inventoryGrid');
                    const cards = data.cards || [];
                    document.getElementById('cardCount').innerText = cards.length;
                    
                    inventoryGrid.innerHTML = '';
                    if(cards.length === 0) {
                        inventoryGrid.innerHTML = `<div style="color:#888; grid-column: 1 / -1; font-size:14px;">目前背包空空如也。</div>`;
                    } else {
                        [...cards].reverse().forEach(card => {
                            const statusHTML = card.redeemed 
                                ? `<span class="status-badge status-redeemed">已領取</span>`
                                : `<span class="status-badge status-pending">待兌換</span>`;
                                
                            inventoryGrid.innerHTML += `
                                <div class="card-placeholder">
                                    ${statusHTML}
                                    <div class="card-name">${card.name}</div>
                                    <div><span class="card-version">${card.version}</span></div>
                                </div>
                            `;
                        });
                    }
                }
            });
        }

        gachaBtn.addEventListener('click', async () => {
            if (!currentStudentId || gachaPool.length === 0) return;
            gachaBtn.disabled = true;
            pullResult.style.color = "#fff"; pullResult.innerText = "🌀 虛空引擎運轉中...";

            try {
                const randomIndex = Math.floor(Math.random() * gachaPool.length);
                const baseCard = gachaPool[randomIndex];

                // 【核心修正】: 注入唯一軍籍編號 (instanceId) 與未核銷狀態 (redeemed: false)
                const pulledCard = {
                    ...baseCard,
                    instanceId: Date.now().toString() + Math.floor(Math.random()*1000),
                    redeemed: false,
                    drawTime: new Date().toLocaleString()
                };

                await updateDoc(doc(db, "students", currentStudentId), {
                    gold: increment(-DRAW_COST),
                    cards: arrayUnion(pulledCard)
                });

                pullResult.style.color = "#00ffcc";
                pullResult.innerText = `✨ 恭喜獲得：【${pulledCard.name}】！ (請向指揮官兌換實體卡)`;
            } catch(e) {
                console.error("抽卡失敗:", e);
                pullResult.style.color = "#e74c3c"; pullResult.innerText = "抽卡失敗，請回報指揮官。";
                gachaBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
